name: connectors

on:
  push:
    paths:
      - "connectors/**"
      - "scripts/validate-connectors.mjs"
      - ".github/workflows/connectors.yml"
  pull_request:
    paths:
      - "connectors/**"
      - "scripts/validate-connectors.mjs"
      - ".github/workflows/connectors.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate connector catalog
        run: node scripts/validate-connectors.mjs
